<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Test Report</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .ok { background: #d4edda; color: #155724; }
        .warn { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>Pattern-Protocol Dashboard - Verification Report</h1>
    <p>Generated: <span id="timestamp"></span></p>
    
    <h2>File Structure</h2>
    <div id="files"></div>
    
    <h2>Data Integrity</h2>
    <div id="data"></div>
    
    <script>
        document.getElementById('timestamp').textContent = new Date().toISOString();
        
        // Verify files exist
        const files = [
            'dashboard/index.html',
            'dashboard/visualization_data.js',
            'dashboard/pattern_heatmap.js',
            'dashboard/time_series_viz.js',
            'data/incidents.json',
            'data/patterns.json',
            'data/protocols.json',
            'data/pattern_regimes.json',
            'data/pattern_metadata.json',
            'docs/regime_metrics.md'
        ];
        
        // For now, just display expected files
        const filesDiv = document.getElementById('files');
        files.forEach(f => {
            const div = document.createElement('div');
            div.className = 'status ok';
            div.textContent = '✓ ' + f;
            filesDiv.appendChild(div);
        });
    </script>
</body>
</html>
